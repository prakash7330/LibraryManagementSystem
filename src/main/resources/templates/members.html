<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Members - Library Management System</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">📚 Library Management System</div>
        <ul class="nav-links">
            <li><a th:href="@{/}">🏠 Home</a></li>
            <li><a th:href="@{/books}">📖 Books</a></li>
            <li><a th:href="@{/members}" class="active">👥 Members</a></li>
            <li><a th:href="@{/borrow}">🔄 Borrow/Return</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h1>👥 Member Management</h1>
            <p>Register and manage library members</p>
        </div>

        <!-- Add Member Form -->
        <div class="card">
            <div class="card-header"><h2>➕ Register New Member</h2></div>
            <div class="card-body">
                <form action="/members/add" method="post" class="form-grid">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="name" placeholder="Enter full name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" name="email" placeholder="Enter email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" placeholder="Enter phone number">
                    </div>
                    <div class="form-group form-btn-group">
                        <button type="submit" class="btn btn-primary">Register Member</button>
                        <button type="reset" class="btn btn-outline">Clear</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Members Table -->
        <div class="card">
            <div class="card-header">
                <h2>👤 All Members</h2>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="member : ${members}">
                                <td th:text="${member.id}"></td>
                                <td th:text="${member.name}"></td>
                                <td th:text="${member.email}"></td>
                                <td th:text="${member.phone}"></td>
                                <td>
                                    <a th:href="@{/members/delete/{id}(id=${member.id})}"
                                       class="btn btn-sm btn-warning"
                                       onclick="return confirm('Delete this member?')">🗑️ Delete</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>📚 Library Management System | Spring Boot + MySQL | 2025</p>
    </footer>

</body>
</html>
